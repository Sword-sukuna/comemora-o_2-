<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Arena Rush</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <!-- MENU -->

  <div id="menu">

    <h1>ARENA RUSH</h1>

    <button onclick="startGame()">
      INICIAR
    </button>

    <button onclick="loadSave()">
      CONTINUAR
    </button>

  </div>


  <!-- GAME OVER -->

  <div id="gameOver">

    <h1>YOU DIED</h1>

    <p id="finalText"></p>

    <button onclick="location.reload()">
      MENU
    </button>

  </div>


  <!-- HUD -->

  <div id="hud">

    <div id="stats">

      <span id="life"></span>

      <span id="souls"></span>

      <span id="floor"></span>

      <span id="room"></span>

    </div>

    <div id="cooldowns">

      <div>

        E

        <div class="bar">
          <div id="barE"></div>
        </div>

      </div>

      <div>

        Q

        <div class="bar">
          <div id="barQ"></div>
        </div>

      </div>

      <div>

        1

        <div class="bar">
          <div id="bar1"></div>
        </div>

      </div>

    </div>

  </div>


  <!-- MINIMAPA -->

  <canvas id="minimap"></canvas>


  <!-- GAME -->

  <canvas id="game"></canvas>


  <script src="script.js"></script>

</body>
</html>
